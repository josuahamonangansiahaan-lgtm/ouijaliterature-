<!DOCTYPE html>
<html lang="id">
<head>

<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>OUIJA AI</title>

<link
href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&display=swap"
rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{

    background:
    radial-gradient(
    circle at center,
    #1a1a1a 0%,
    #000 80%
    );

    overflow:hidden;

    font-family:
    'Cinzel',
    serif;

    height:100vh;

    display:flex;
    justify-content:center;
    align-items:center;

    color:white;
}

body::before{

    content:"";

    position:absolute;
    width:200%;
    height:200%;

    background:
    repeating-radial-gradient(
    circle,
    rgba(255,255,255,.03) 0px,
    rgba(255,255,255,0) 2px,
    transparent 4px
    );

    animation:
    fog 20s linear infinite;
}

@keyframes fog{

    from{
        transform:
        translate(-10%,-10%);
    }

    to{
        transform:
        translate(10%,10%);
    }
}

.container{

    position:relative;
    z-index:2;

    display:flex;
    flex-direction:column;
    align-items:center;
}

.title{

    font-size:60px;
    letter-spacing:10px;

    margin-bottom:10px;

    text-shadow:
    0 0 10px #fff,
    0 0 20px #888;
}

.subtitle{

    color:#888;
    margin-bottom:30px;
}

#board{

    width:700px;
    height:700px;

    border-radius:50%;

    position:relative;

    background:
    radial-gradient(
    circle,
    #111 0%,
    #000 90%
    );

    border:
    5px solid #333;

    box-shadow:
    0 0 40px rgba(255,255,255,.1),
    inset 0 0 40px rgba(255,255,255,.05);
}

.letter{

    position:absolute;

    color:#777;

    font-size:22px;

    transition:.3s;
}

.letter:hover{

    color:white;

    text-shadow:
    0 0 10px white;
}

.center-circle{

    position:absolute;

    width:180px;
    height:180px;

    border-radius:50%;

    border:
    2px solid rgba(255,255,255,.1);

    left:50%;
    top:50%;

    transform:
    translate(-50%,-50%);
}

#planchette{

    position:absolute;

    width:140px;
    height:80px;

    background:
    linear-gradient(
    145deg,
    #ddd,
    #999
    );

    border-radius:50%;

    left:280px;
    top:310px;

    z-index:20;

    display:flex;
    justify-content:center;
    align-items:center;

    color:black;
    font-weight:bold;

    cursor:grab;

    box-shadow:
    0 0 20px rgba(255,255,255,.5);
}

.eye{

    width:25px;
    height:25px;

    border-radius:50%;

    background:black;

    margin:5px;
}

.controls{

    margin-top:30px;

    display:flex;
    flex-direction:column;
    align-items:center;
}

.input-box{

    display:flex;
    gap:10px;
}

input{

    width:350px;

    padding:15px;

    border:none;

    outline:none;

    background:#111;

    color:#0f0;

    border:
    1px solid #333;

    border-radius:10px;

    font-size:16px;
}

button{

    padding:15px 25px;

    background:#111;

    color:white;

    border:
    1px solid #444;

    border-radius:10px;

    cursor:pointer;

    transition:.3s;
}

button:hover{

    background:#222;

    box-shadow:
    0 0 20px rgba(255,255,255,.2);
}

#response-area{

    margin-top:20px;

    min-height:60px;

    color:#0f0;

    text-align:center;

    width:500px;

    font-size:18px;

    text-shadow:
    0 0 10px #0f0;
}

.loading{

    animation:
    blink 1s infinite;
}

@keyframes blink{

    50%{
        opacity:0;
    }
}

.candle{

    position:absolute;

    bottom:20px;

    width:20px;
    height:80px;

    background:#ddd;
}

.flame{

    position:absolute;

    width:20px;
    height:40px;

    background:orange;

    border-radius:50%;

    top:-25px;

    filter:blur(2px);

    animation:
    flame 1s infinite alternate;
}

@keyframes flame{

    from{
        transform:
        scale(1);
    }

    to{
        transform:
        scale(1.2)
        translateY(-5px);
    }
}

.left{
    left:50px;
}

.right{
    right:50px;
}

</style>

</head>

<body>

<div class="container">

<div class="title">
OUIJA AI
</div>

<div class="subtitle">
Speak with the unknown...
</div>

<div id="board">

<div class="center-circle"></div>

<div id="planchette">

<div class="eye"></div>
<div class="eye"></div>

</div>

<div class="candle left">
<div class="flame"></div>
</div>

<div class="candle right">
<div class="flame"></div>
</div>

</div>

<div class="controls">

<div class="input-box">

<input
type="text"
id="user-input"
placeholder="Tanyakan sesuatu...">

<button onclick="askSpirits()">
PANGGIL
</button>

</div>

<div id="response-area">
Roh sedang tidur...
</div>

</div>

</div>

<script>

const board =
document.getElementById(
"board"
);

const letters =
"ABCDEFGHIJKLMNOPQRSTUVWXYZ";

const radius = 300;

const centerX = 350;
const centerY = 350;

letters.split("").forEach(
(letter,index)=>{

const el =
document.createElement("div");

el.className =
"letter";

el.innerText =
letter;

const angle =
(index / 26)
* Math.PI * 2;

const x =
centerX +
radius *
Math.cos(angle);

const y =
centerY +
radius *
Math.sin(angle);

el.style.left =
x + "px";

el.style.top =
y + "px";

board.appendChild(el);

});

const planchette =
document.getElementById(
"planchette"
);

let drag = false;

planchette.onmousedown =
()=>{
drag = true;
};

window.onmouseup =
()=>{
drag = false;
};

window.onmousemove =
(e)=>{

if(!drag) return;

const rect =
board.getBoundingClientRect();

planchette.style.left =
(e.clientX
- rect.left
- 70)
+ "px";

planchette.style.top =
(e.clientY
- rect.top
- 40)
+ "px";

};

</script>

<script src="ouija.js"></script>

</body>
</html>
